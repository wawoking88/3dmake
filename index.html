<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Scratch風 3Dゲームメーカー Blockly修正版</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Blocklyは1本読み込みにして安定化 -->
  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly/msg/ja.js"></script>
</head>
<body>
  <div id="errorBox" class="errorBox hidden"></div>

  <header class="topbar">
    <div class="brand">🧊 Scratch風 3Dゲームメーカー <span>Blockly修正版</span></div>
    <div class="topActions">
      <button id="runBtn" class="primary">▶ 実行</button>
      <button id="stopBtn">■ 停止</button>
      <button id="saveBtn">保存</button>
      <button id="loadBtn">読込</button>
      <button id="clearBtn" class="danger">全消去</button>
    </div>
  </header>

  <main class="app">
    <section class="centerPanel">
      <div class="stageHeader">
        <div>
          <strong>3Dステージ</strong>
          <span id="status">停止中</span>
        </div>
        <div class="stageTools">
          <button id="modeMoveBtn" class="tool active">移動</button>
          <button id="modeRotateBtn" class="tool">向き変更</button>
          <button id="modeScaleBtn" class="tool">スケール</button>
          <button id="camResetBtn">カメラリセット</button>
        </div>
      </div>

      <div id="stageWrap">
        <canvas id="stage"></canvas>
        <div class="stageHint">選択中：<span id="selectedSpriteName">未選択</span></div>
      </div>
    </section>

    <section class="rightPanel">
      <div class="panelTitleRow">
        <div class="panelTitle">スプライト</div>
        <button id="openAddSpriteBtn" class="plusBtn">＋</button>
      </div>

      <div id="spriteList" class="spriteList"></div>

      <div class="panelTitle small">プロパティ</div>
      <div class="propGrid">
        <label>名前<input id="propName" /></label>
        <label>X<input id="propX" type="number" step="0.1" /></label>
        <label>Y<input id="propY" type="number" step="0.1" /></label>
        <label>Z<input id="propZ" type="number" step="0.1" /></label>
        <label>向X<input id="propRotX" type="number" step="1" /></label>
        <label>向Y<input id="propRotY" type="number" step="1" /></label>
        <label>向Z<input id="propRotZ" type="number" step="1" /></label>
        <label>大X<input id="propScaleX" type="number" step="0.1" min="0.1" /></label>
        <label>大Y<input id="propScaleY" type="number" step="0.1" min="0.1" /></label>
        <label>大Z<input id="propScaleZ" type="number" step="0.1" min="0.1" /></label>
        <label>色<input id="propColor" type="color" /></label>
      </div>

      <button id="deleteSpriteBtn" class="danger full">選択スプライト削除</button>

      <div class="panelTitle small">説明</div>
      <p class="note">
        ・最初からCameraがあります。<br>
        ・実行中はCameraの位置と向きが画面になります。<br>
        ・白い線がCameraの向きです。<br>
        ・ステージ上のスプライトを選んで移動/回転/スケールできます。
      </p>
    </section>

    <section class="blocklyPanel">
      <div class="scriptHeader">
        <strong>ブロックコード</strong>
        <span id="blocklyTargetName">未選択</span>
      </div>
      <div id="blocklyDiv"></div>
    </section>
  </main>

  <div id="spriteModal" class="modal hidden">
    <div class="modalCard">
      <div class="modalHeader">
        <strong>追加するスプライトを選ぶ</strong>
        <button id="closeModalBtn">×</button>
      </div>
      <div class="spriteChoices">
        <button class="choice" data-kind="box">▭<span>直方体</span></button>
        <button class="choice" data-kind="sphere">●<span>球</span></button>
        <button class="choice" data-kind="cylinder">⬤<span>円柱</span></button>
        <button class="choice" data-kind="capsule">⬮<span>Capsule</span></button>
        <button class="choice" data-kind="cone">▲<span>円すい</span></button>
      </div>
    </div>
  </div>

  <xml id="toolbox" style="display:none">
    <category name="イベント" colour="40">
      <block type="event_start"></block>
      <block type="event_forever"></block>
    </category>
    <category name="制御" colour="330">
      <block type="controls_if"></block>
      <block type="wait_seconds"><field name="SEC">1</field></block>
    </category>
    <category name="入力" colour="180">
      <block type="key_pressed"><field name="KEY">ArrowUp</field></block>
    </category>
    <category name="動き" colour="210">
      <block type="move_forward"><field name="AMOUNT">1</field></block>
      <block type="turn_y"><field name="DEG">15</field></block>
      <block type="go_to"><field name="X">0</field><field name="Y">1</field><field name="Z">0</field></block>
      <block type="jump"><field name="POWER">0.18</field></block>
    </category>
    <category name="見た目" colour="270">
      <block type="set_color"><field name="COLOR">#ff6b6b</field></block>
      <block type="set_scale"><field name="SCALE">1.2</field></block>
    </category>
  </xml>

  <script type="module" src="script.js"></script>
</body>
</html>
